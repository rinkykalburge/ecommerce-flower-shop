<head>
<meta charset="UTF-8">
<title>Online Voting System</title>

<style>
    body { font-family: Arial; background:#F3D6DF;height:100vh; text-align: center; padding: 20px; }
    h1 { color: #0e5261; }

    #loginBox, #votingSection, #winnerBox {
        background:#F7AEB4; width: 350px; padding: 25px;

    .container { display: flex; justify-content: center; gap: 30px; margin-top: 25px; }
    .candidate { background: white; padding: 15px; width: 220px;
                 border-radius: 10px; box-shadow: 0 0 10px #ccc; }
    .candidate img { width: 200px; height: 200px; border-radius: 10px; object-fit: cover; }
   h1 {
      color:blue;  
    }

</style>

<!-- WINNER PAGE -->
<div id="winnerBox" style="display:none;"></div>

<script>
        localStorage.setItem("votes",JSON.stringify([0,0,0,]));
    /* ------------------------
       SETTINGS
    --------------------------- */
    const totalVoters = 5;  // change as you want

    /* ------------------------
       LOGIN
    --------------------------- */
    const correctUser = "bkit";
    const correctPass = "1234";

    function login() {
        let u = document.getElementById("username").value;
        let p = document.getElementById("password").value;

        if (u === correctUser && p === correctPass) {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("votingSection").style.display = "block";
        } else {
            document.getElementById("loginError").innerText = "Invalid Login!";
        }
    }

    /* ------------------------
       INITIALIZE STORAGE
    --------------------------- */
    if (!localStorage.getItem("c1")) {
        localStorage.setItem("c1", 0);
        localStorage.setItem("c2", 0);
        localStorage.setItem("c3", 0);
        localStorage.setItem("votedCount", 0);
    }

    /* ------------------------
       VOTING FUNCTION
    --------------------------- */
    function vote(candidate) {

        let votedCount = Number(localStorage.getItem("votedcount"));

        if (votedCount >= totalVoters) {
            alert("Voting Completed!");
            showWinner();
            return;
        }

        if (candidate === 1) localStorage.setItem("c1", Number(localStorage.getItem("c1")) + 1);
        if (candidate === 2) localStorage.setItem("c2", Number(localStorage.getItem("c2")) + 1);
        if (candidate === 3) localStorage.setItem("c3", Number(localStorage.getItem("c3")) + 1);

        localStorage.setItem("votedCount", votedCount + 1);

        alert("Vote Submitted!");

        // If all voters finished → show winner
        if (Number(localStorage.getItem("votedCount")) == totalVoters) {
            showWinner();
        }
    }

    /* ------------------------
       WINNER FUNCTION
    --------------------------- */
    function showWinner() {

        let c1 = Number(localStorage.getItem("c1"));
        let c2 = Number(localStorage.getItem("c2"));
        let c3 = Number(localStorage.getItem("c3"));
        let votedCount = Number(localStorage.getItem("votedCount"));

        if (votedCount < totalVoters) {
            alert("Voting not completed yet!");
            return;
        }

        let highest = Math.max(c1, c2, c3);
        let winner = "";

        if (highest === c1) winner = "Candidate 1";
        if (highest === c2) winner = "Candidate 2";
        if (highest === c3) winner = "Candidate 3";

        document.getElementById("votingSection").style.display = "none";

        document.getElementById("winnerBox").style.display = "block";
        document.getElementById("winnerBox").innerHTML = `
            <h2>Final Results</h2>
            Candidate 1: ${c1} votes<br>
            Candidate 2: ${c2} votes<br>
            Candidate 3: ${c3} votes<br><br>

            <h3>🏆 Winner: ${winner} 🏆</h3>
        `;
    }

</script>
